<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Localization Upload</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 500px; margin: auto; padding: 24px; border: 1px solid #ccc; border-radius: 8px; }
        h2 { text-align: center; }
        label { display: block; margin-top: 18px; font-weight: bold; }
        input[type="file"] { margin-top: 8px; }
        button { margin-top: 24px; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; background: #0078d7; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #aaa; }
        .success { color: green; text-align: center; margin-top: 18px; }
        .error { color: red; text-align: center; margin-top: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload Localization Files</h2> 
        <form id="uploadForm">
            <label for="langFiles">Language JSON files <span style="color: #d32f2f; font-size: 12px; margin-left: 8px; vertical-align: middle;">*make sure you selected en.json file</span></label>
            <input type="file" id="langFiles" name="langFiles" accept=".json" multiple required>

            <label for="fontFile">Font Family JSON file</label>
            <input type="file" id="fontFile" name="fontFile" accept=".json" multiple required>

            <button type="submit">Upload & Continue</button>
        </form>
        <div id="message"></div>
    </div>
    <script src="upload.js"></script>
    <div id="previewArea" style="margin-top:40px;"></div>
    <script src="spin-localization.js"></script>
    <script>
    // Inline preview rendering after upload
    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        setTimeout(function() {
            // Hide upload form and show preview UI
            document.querySelector('.container').style.display = 'none';
            document.getElementById('previewArea').innerHTML = `
                <div style="position: relative; width: 100%; height: 100vh;">
                    <div style="position: absolute; top: 10px; right: 10px; display: flex; align-items: center; gap: 10px;">
                        <button id="logoutBtn" style="margin-right: 18px; padding: 6px 16px; font-size: 14px; font-weight: bold; background: #e74c3c; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
                        <label for="langSelect" style="font-weight: bold; margin-right: 8px;">Lang:</label>
                        <select id="langSelect" style="padding: 5px 10px; font-size: 14px;"></select>
                        <label for="fontSizeSelect" style="font-weight: bold;">Font Size:</label>
                        <select id="fontSizeSelect" style="padding: 5px 10px; font-size: 14px;">
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14" selected>14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                            <option value="17">17</option>
                            <option value="18">18</option>
                            <option value="19">19</option>
                            <option value="20">20</option>
                            <option value="21">21</option>
                            <option value="22">22</option>
                            <option value="23">23</option>
                            <option value="24">24</option>
                        </select>
                        <label for="unitSelect" style="font-weight: bold;">Unit:</label>
                        <select id="unitSelect" style="padding: 5px 10px; font-size: 14px;">
                            <option value="px" selected>px</option>
                            <option value="cm">cm</option>
                            <option value="mm">mm</option>
                            <option value="in">in</option>
                            <option value="pt">pt</option>
                        </select>
                        <label for="fontFamilySelect" style="font-weight: bold;">Font Family:</label>
                        <select id="fontFamilySelect" style="padding: 5px 10px; font-size: 14px; min-width: 120px;"></select>
                    </div>
                    <h2 style="padding: 8px 20px 0 20px; margin: 0 0 4px 0;">Localization Content Verification</h2>
                    <div id="spin" style="padding: 20px; margin-top: 50px;"></div>
                </div>
            `;
            // Add logout handler
            document.getElementById('logoutBtn').onclick = function() {
                sessionStorage.clear();
                window.location.href = '/';
            };
            // Initialize the preview logic
            if (typeof initializeApp === 'function') {
                // Try to load en.json from uploaded files
                let enData = null;
                if (sessionStorage.getItem('langFiles')) {
                    try {
                        const langFiles = JSON.parse(sessionStorage.getItem('langFiles'));
                        const enFile = langFiles.find(f => f.name.toLowerCase() === 'en.json');
                        if (enFile) enData = JSON.parse(enFile.content);
                    } catch (e) {}
                }
                if (enData) initializeApp(enData);
            }
        }, 1200); // Wait for upload.js to finish
    });
    </script>
</body>
</html>
