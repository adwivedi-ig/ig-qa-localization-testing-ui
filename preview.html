<div id="previewUI" style="display:none;">
    <div style="position: relative; width: 100%; height: 100vh;">
        <div id="previewTabs" style="padding: 10px 20px 0 20px; display: flex; gap: 8px;">
            <button id="previewTabPrimary" type="button" style="padding: 8px 14px; font-size: 14px; font-weight: bold; border: 1px solid #1976d2; background: #1976d2; color: #fff; border-radius: 4px; cursor: pointer;">Home</button>
            <button id="previewTabDuplicate" type="button" style="padding: 8px 14px; font-size: 14px; font-weight: bold; border: 1px solid #1976d2; background: #fff; color: #1976d2; border-radius: 4px; cursor: pointer;">Localized</button>
        </div>
        <h2 style="padding: 8px 20px 0 20px; margin: 0 0 4px 0;">Localization Content Verification</h2>
        <div id="previewHeaderControls" style="padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <button id="logoutBtn" style="margin-right: 18px; padding: 6px 16px; font-size: 14px; font-weight: bold; background: #e74c3c; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
            <!-- Tab 1 controls -->
            <label id="langLabel" for="langSelect" style="font-weight: bold; margin-right: 8px;">Lang:</label>
            <select id="langSelect" style="padding: 5px 10px; font-size: 14px;"></select>
            <label id="fontSizeLabel" for="fontSizeSelect" style="font-weight: bold;">Font Size:</label>
            <select id="fontSizeSelect" style="padding: 5px 10px; font-size: 14px;">
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
                <option value="14" selected>14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
            </select>
            <label id="unitLabel" for="unitSelect" style="font-weight: bold;">Unit:</label>
            <select id="unitSelect" style="padding: 5px 10px; font-size: 14px;">
                <option value="px" selected>px</option>
                <option value="cm">cm</option>
                <option value="mm">mm</option>
                <option value="in">in</option>
                <option value="pt">pt</option>
            </select>
            <label id="fontFamilyLabel" for="fontFamilySelect" style="font-weight: bold;">Font Family:</label>
            <select id="fontFamilySelect" style="padding: 5px 10px; font-size: 14px; min-width: 120px;"></select>
            <!-- Tab 2 controls (hidden until Tab 2 is active) -->
            <label id="tab2LangLabel" for="tab2LangSelect" style="display: none; font-weight: bold; margin-right: 8px;">Lang:</label>
            <select id="tab2LangSelect" style="display: none; padding: 5px 10px; font-size: 14px; min-width: 120px;"></select>
        </div>

        <div id="previewPanePrimary" style="display: block;">
            <div id="spin" style="padding: 20px;"></div>
        </div>

        <div id="previewPaneDuplicate" style="display: none;">
            <div id="spin2" style="padding: 20px;"></div>
        </div>
    </div>
</div>
<script src="spin-localization.js"></script>
<script src="Localized.js"></script>
<script>
let activePreviewTab = 'primary';
const previewTabState = {
    primary: {
        controls: { lang: 'ALL', fontSize: '14', unit: 'px', fontFamily: 'ALL_FONTS' },
        renderedHTML: '',
        renderedFontFamily: '',
        renderedFontSize: ''
    },
    duplicate: {
        controls: { lang: 'ALL' }
    }
};

const TAB1_CONTROL_IDS = ['langLabel', 'langSelect', 'fontSizeLabel', 'fontSizeSelect', 'unitLabel', 'unitSelect', 'fontFamilyLabel', 'fontFamilySelect'];
const TAB2_CONTROL_IDS = ['tab2LangLabel', 'tab2LangSelect'];

function getHeaderControlValues() {
    if (activePreviewTab === 'duplicate') {
        const tab2LangSelect = document.getElementById('tab2LangSelect');
        return {
            lang: tab2LangSelect && tab2LangSelect.value ? tab2LangSelect.value : 'ALL'
        };
    }
    const langSelect = document.getElementById('langSelect');
    const fontSizeSelect = document.getElementById('fontSizeSelect');
    const unitSelect = document.getElementById('unitSelect');
    const fontFamilySelect = document.getElementById('fontFamilySelect');
    return {
        lang: langSelect && langSelect.value ? langSelect.value : 'ALL',
        fontSize: fontSizeSelect && fontSizeSelect.value ? fontSizeSelect.value : '14',
        unit: unitSelect && unitSelect.value ? unitSelect.value : 'px',
        fontFamily: fontFamilySelect && fontFamilySelect.value ? fontFamilySelect.value : 'ALL_FONTS'
    };
}

function applyHeaderControlValues(controlValues) {
    if (activePreviewTab === 'duplicate') {
        const tab2LangSelect = document.getElementById('tab2LangSelect');
        if (tab2LangSelect && controlValues.lang) tab2LangSelect.value = controlValues.lang;
        return;
    }
    const langSelect = document.getElementById('langSelect');
    const fontSizeSelect = document.getElementById('fontSizeSelect');
    const unitSelect = document.getElementById('unitSelect');
    const fontFamilySelect = document.getElementById('fontFamilySelect');
    if (langSelect && controlValues.lang) langSelect.value = controlValues.lang;
    if (fontSizeSelect && controlValues.fontSize) fontSizeSelect.value = controlValues.fontSize;
    if (unitSelect && controlValues.unit) unitSelect.value = controlValues.unit;
    if (fontFamilySelect && controlValues.fontFamily) fontFamilySelect.value = controlValues.fontFamily;
}

function saveActiveTabControls() {
    previewTabState[activePreviewTab].controls = getHeaderControlValues();
}

function captureRenderForActiveTab() {
    if (activePreviewTab !== 'primary') {
        return;
    }

    const primarySpin = document.getElementById('spin');
    if (!primarySpin) {
        return;
    }

    previewTabState[activePreviewTab].renderedHTML = primarySpin.innerHTML;
    previewTabState[activePreviewTab].renderedFontFamily = primarySpin.style.fontFamily || '';
    previewTabState[activePreviewTab].renderedFontSize = primarySpin.style.fontSize || '';
}

function initializeRenderCaptureObserver() {
    const primarySpin = document.getElementById('spin');
    if (!primarySpin) {
        return;
    }

    // Capture every renderer update into the currently active tab state.
    const observer = new MutationObserver(function() {
        captureRenderForActiveTab();
    });

    observer.observe(primarySpin, {
        childList: true,
        subtree: true,
        characterData: true,
        attributes: true
    });
}

function renderActiveTab() {
    if (activePreviewTab === 'duplicate') {
        if (window.tab2FontsPreview && typeof window.tab2FontsPreview.renderCurrent === 'function') {
            window.tab2FontsPreview.renderCurrent();
        }
        return;
    }

    if (typeof initializeApp === 'function' && typeof enData !== 'undefined' && enData) {
        initializeApp(enData);
        return;
    }

    const primarySpin = document.getElementById('spin');
    if (!primarySpin) {
        return;
    }

    const cached = previewTabState[activePreviewTab];
    if (cached && cached.renderedHTML) {
        primarySpin.innerHTML = cached.renderedHTML;
        primarySpin.style.fontFamily = cached.renderedFontFamily;
        primarySpin.style.fontSize = cached.renderedFontSize;
    }
}

function setActivePreviewTab(tab) {
    const primaryPane = document.getElementById('previewPanePrimary');
    const duplicatePane = document.getElementById('previewPaneDuplicate');
    const primaryBtn = document.getElementById('previewTabPrimary');
    const duplicateBtn = document.getElementById('previewTabDuplicate');

    if (!primaryPane || !duplicatePane || !primaryBtn || !duplicateBtn) {
        return;
    }

    saveActiveTabControls();
    activePreviewTab = tab;
    applyHeaderControlValues(previewTabState[activePreviewTab].controls);
    renderActiveTab();

    const primaryActive = activePreviewTab === 'primary';
    primaryPane.style.display = primaryActive ? 'block' : 'none';
    duplicatePane.style.display = primaryActive ? 'none' : 'block';

    TAB1_CONTROL_IDS.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.style.display = primaryActive ? '' : 'none';
    });
    TAB2_CONTROL_IDS.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.style.display = primaryActive ? 'none' : '';
    });

    primaryBtn.style.background = primaryActive ? '#1976d2' : '#fff';
    primaryBtn.style.color = primaryActive ? '#fff' : '#1976d2';
    duplicateBtn.style.background = primaryActive ? '#fff' : '#1976d2';
    duplicateBtn.style.color = primaryActive ? '#1976d2' : '#fff';
}

function initializePreviewTabs() {
    const primaryBtn = document.getElementById('previewTabPrimary');
    const duplicateBtn = document.getElementById('previewTabDuplicate');

    if (primaryBtn) {
        primaryBtn.addEventListener('click', function() {
            setActivePreviewTab('primary');
        });
    }

    if (duplicateBtn) {
        duplicateBtn.addEventListener('click', function() {
            setActivePreviewTab('duplicate');
        });
    }

    const langSelect = document.getElementById('langSelect');
    const fontSizeSelect = document.getElementById('fontSizeSelect');
    const unitSelect = document.getElementById('unitSelect');
    const fontFamilySelect = document.getElementById('fontFamilySelect');

    [langSelect, fontSizeSelect, unitSelect, fontFamilySelect].forEach(function(ctrl) {
        if (!ctrl) {
            return;
        }

        ctrl.addEventListener('change', function() {
            saveActiveTabControls();
        });
    });

    setActivePreviewTab('primary');
    initializeRenderCaptureObserver();
}

var hasRequiredSessionData = sessionStorage.getItem('langFiles') && sessionStorage.getItem('fontFiles') && sessionStorage.getItem('langFilesWithFonts');
if (!hasRequiredSessionData) {
    window.location.href = 'index.html';
} else {
    document.getElementById('previewUI').style.display = '';
    initializePreviewTabs();
    if (window.tab2FontsPreview && typeof window.tab2FontsPreview.initialize === 'function') {
        window.tab2FontsPreview.initialize();
    }
}

// Logout button clears session and navigates to root
document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'logoutBtn') {
        sessionStorage.clear();
        window.location.href = '/';
    }
});
</script>
